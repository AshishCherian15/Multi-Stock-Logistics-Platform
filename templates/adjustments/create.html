{% extends "base.html" %}
{% block title %}New Adjustment{% endblock %}
{% block content %}
<div class="container py-4" style="max-width:600px">
  <h2 class="fw-bold mb-4">New Stock Adjustment</h2>
  <div class="card shadow-sm"><div class="card-body">
    <form method="post">{% csrf_token %}
      <div class="mb-3"><label class="form-label fw-semibold">Product</label>
        <select name="product_id" class="form-select" required>{% for p in products %}<option value="{{ p.id }}">{{ p.goods_desc }} ({{ p.goods_code }})</option>{% endfor %}</select></div>
      <div class="row mb-3">
        <div class="col-md-6"><label class="form-label fw-semibold">Type</label>
          <select name="adjustment_type" class="form-select"><option value="count">Stock Count</option><option value="correction">Correction</option><option value="damage">Damage Write-off</option><option value="expiry">Expiry</option><option value="return">Return to Stock</option></select></div>
        <div class="col-md-6"><label class="form-label fw-semibold">Quantity</label>
          <input type="number" name="quantity" class="form-control" required placeholder="Use negative to remove"></div>
      </div>
      <div class="mb-3"><label class="form-label fw-semibold">Reason</label>
        <textarea name="reason" class="form-control" rows="3" required></textarea></div>
      <div class="d-flex gap-2">
        <button type="submit" class="btn btn-primary">Submit</button>
        <a href="{% url 'adjustments:list' %}" class="btn btn-outline-secondary">Cancel</a>
      </div>
    </form>
  </div></div>
</div>
{% endblock %}
