{% extends "base.html" %}
{% block title %}New Ticket{% endblock %}
{% block content %}
<div class="container py-4" style="max-width:700px">
  <h2 class="fw-bold mb-4"><i class="fas fa-plus-circle me-2 text-primary"></i>New Support Ticket</h2>
  <div class="card shadow-sm">
    <div class="card-body">
      <form method="post">{% csrf_token %}
        <div class="mb-3">
          <label class="form-label fw-semibold">Subject</label>
          <input type="text" name="subject" class="form-control" required maxlength="200" placeholder="Brief description of your issue">
        </div>
        <div class="row mb-3">
          <div class="col-md-6">
            <label class="form-label fw-semibold">Category</label>
            <select name="category" class="form-select">{% for val,label in categories %}<option value="{{ val }}">{{ label }}</option>{% endfor %}</select>
          </div>
          <div class="col-md-6">
            <label class="form-label fw-semibold">Priority</label>
            <select name="priority" class="form-select">{% for val,label in priorities %}<option value="{{ val }}">{{ label }}</option>{% endfor %}</select>
          </div>
        </div>
        <div class="mb-3">
          <label class="form-label fw-semibold">Description</label>
          <textarea name="description" class="form-control" rows="5" required placeholder="Describe your issue in detail..."></textarea>
        </div>
        <div class="d-flex gap-2">
          <button type="submit" class="btn btn-primary"><i class="fas fa-paper-plane me-1"></i>Submit</button>
          <a href="{% url 'tickets:list' %}" class="btn btn-outline-secondary">Cancel</a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
