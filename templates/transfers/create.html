{% extends "base.html" %}
{% block title %}New Transfer{% endblock %}
{% block content %}
<div class="container py-4" style="max-width:600px">
  <h2 class="fw-bold mb-4">New Stock Transfer</h2>
  <div class="card shadow-sm"><div class="card-body">
    <form method="post">{% csrf_token %}
      <div class="mb-3"><label class="form-label fw-semibold">Product</label>
        <select name="product_id" class="form-select" required>{% for p in products %}<option value="{{ p.id }}">{{ p.goods_desc }} ({{ p.goods_code }})</option>{% endfor %}</select></div>
      <div class="row mb-3">
        <div class="col-md-6"><label class="form-label fw-semibold">From Warehouse</label>
          <select name="from_warehouse" class="form-select" required>{% for w in warehouses %}<option value="{{ w.id }}">{{ w.warehouse_name }}</option>{% endfor %}</select></div>
        <div class="col-md-6"><label class="form-label fw-semibold">To Warehouse</label>
          <select name="to_warehouse" class="form-select" required>{% for w in warehouses %}<option value="{{ w.id }}">{{ w.warehouse_name }}</option>{% endfor %}</select></div>
      </div>
      <div class="mb-3"><label class="form-label fw-semibold">Quantity</label>
        <input type="number" name="quantity" class="form-control" min="1" required></div>
      <div class="mb-3"><label class="form-label fw-semibold">Notes</label>
        <textarea name="notes" class="form-control" rows="2"></textarea></div>
      <div class="d-flex gap-2">
        <button type="submit" class="btn btn-primary">Create Transfer</button>
        <a href="{% url 'transfers:list' %}" class="btn btn-outline-secondary">Cancel</a>
      </div>
    </form>
  </div></div>
</div>
{% endblock %}
